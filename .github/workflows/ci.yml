name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test module loading
        run: node -e "import('./dist/adapters/registry.js').then(m => { const r = new m.AdapterRegistry(); console.log('Registry OK, adapters:', r.getAll().map(a => a.name).join(', ')); })"

      - name: Test config module
        run: node -e "import('./dist/config.js').then(m => { m.ensureDataDir(); console.log('Config OK:', JSON.stringify(m.loadConfig())); })"

      - name: Test commandExists
        run: node -e "import('./dist/adapters/claude.js').then(async m => { const ok = await m.commandExists('node'); console.log('commandExists(node):', ok); if (!ok) process.exit(1); })"

      - name: Test spawnOpts shell flag
        shell: bash
        run: |
          node -e "
            import('./dist/adapters/claude.js').then(m => {
              const opts = m.spawnOpts('/tmp');
              const isWin = process.platform === 'win32';
              console.log('platform:', process.platform, 'shell:', opts.shell);
              if (isWin && !opts.shell) { console.error('FAIL: must be shell:true on Windows'); process.exit(1); }
              if (!isWin && opts.shell) { console.error('FAIL: should not be shell:true on non-Windows'); process.exit(1); }
              console.log('PASS');
            })
          "

      - name: Test spawn with shell on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          node --input-type=module -e "
            import { spawn } from 'child_process';
            const m = await import('./dist/adapters/claude.js');
            const opts = m.spawnOpts();
            const proc = spawn('where', ['node'], { ...opts, stdio: 'pipe' });
            let out = '';
            proc.stdout.on('data', c => { out += c; });
            proc.on('close', code => {
              console.log('where node:', out.trim().split('\n')[0]);
              if (code !== 0) { console.error('FAIL'); process.exit(1); }
              console.log('PASS: Windows spawn with shell works');
            });
          "
